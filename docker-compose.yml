version: '3.9'

services:
  taskpilot:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://taskpilot:taskpilot@db:5432/taskpilot
      - APP_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskpilot
      POSTGRES_PASSWORD: taskpilot
      POSTGRES_DB: taskpilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
